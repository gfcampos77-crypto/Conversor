<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Coordenadas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        *:focus { outline: none !important; box-shadow: none !important; -webkit-tap-highlight-color: transparent !important; }
        textarea:focus, input[type="text"]:focus, select:focus { outline: 2px solid #3b82f6 !important; outline-offset: -2px; box-shadow: none !important; }
        button:focus, .btn:focus, .close-btn:focus { outline: none !important; box-shadow: none !important; border: none !important; }

        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background-color: #f4f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px;
        }

        .card {
            background: white; padding: 40px 45px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 6px solid #8fa4c9;
            width: 550px; text-align: center; position: relative;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; cursor: default;
        }

        .card .btn { cursor: pointer; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .card select { cursor: pointer; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }

        .selector-canto { position: absolute; top: 15px; right: 15px; }
        .selector-canto select {
            padding: 5px 10px; border-radius: 6px; border: 2px solid #cbd5e1;
            font-size: 12px; font-weight: 700; color: #1e293b; background: white; cursor: pointer;
        }

        .header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .gear-icon { color: #3b82f6; font-size: 40px; }
        h1 { color: #2c3e50; font-size: 26px; font-weight: 700; text-transform: uppercase; line-height: 1.2; margin: 0; }
        .system-info { margin: 20px 0 25px 0; text-align: center; }
        .system-name { font-size: 18px; color: #2c3e50; }
        .system-name strong { color: #3b82f6; font-weight: 700; }
        .developer { font-size: 16px; color: #4b5563; margin-top: 5px; }
        .developer strong { color: #2c3e50; font-weight: 700; }
        .buttons { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px 25px; border: none; border-radius: 8px; color: white;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s; text-decoration: none; min-width: 140px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .btn:active { transform: translateY(2px); }
        .btn-blue { background: #3b82f6; box-shadow: 0 4px 0 #2563eb; }
        .btn-blue:active { box-shadow: 0 1px 0 #2563eb; }
        .btn-green { background: #22c55e; box-shadow: 0 4px 0 #16a34a; }
        .btn-green:active { box-shadow: 0 1px 0 #16a34a; }
        .btn-orange { background: #f59e0b; box-shadow: 0 4px 0 #d97706; }
        .btn-orange:active { box-shadow: 0 1px 0 #d97706; }
        .icon-svg { width: 22px; height: 22px; fill: currentColor; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }

        .modal {
            background: white; border-radius: 12px; width: 90%; max-width: 1000px;
            height: 85vh; display: flex; flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); padding: 30px;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; cursor: default;
        }
        .modal-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .modal .btn, .modal .close-btn { cursor: pointer; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; flex-shrink: 0; }
        .modal-header h2 { color: #2c3e50; font-size: 20px; }
        .close-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: #94a3b8; }
        .close-btn:hover { color: #ef4444; }
        label { display: block; font-weight: 700; color: #334155; margin-bottom: 5px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
        textarea { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; resize: none; }
        textarea:focus { outline: 2px solid #3b82f6; border-color: #3b82f6; box-shadow: none; }
        .input-area { height: 150px; flex-shrink: 0; }

        .output-box {
            flex: 1; min-height: 0; overflow-y: scroll; overflow-x: auto; border-radius: 8px; padding: 10px;
            font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; line-height: 1.7;
            white-space: pre; word-break: keep-all;
            -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; cursor: text;
        }
        .output-box-coords { background: #1e293b; color: #e2e8f0; }
        .output-box-nomes { background: #f8fafc; color: #1e293b; }

        .coord-click { cursor: pointer; transition: all 0.12s; display: inline; }
        .coord-click:hover { font-size: 1.05em; text-shadow: 0 0 3px rgba(255,255,255,0.6); }
        .coord-click.copied { color: #22c55e !important; }

        .btn-row { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; flex-shrink: 0; align-items: center; }
        .btn-sm { padding: 10px 18px; font-size: 13px; min-width: auto; }
        .badge { background: #dbeafe; color: #1e40af; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; margin-left: 8px; }
        .row-modal { display: flex; gap: 15px; flex: 1; min-height: 0; }
        .row-modal > div { flex: 1; display: flex; flex-direction: column; }
        .row-modal > div.nomes-col { flex: 0.25; }
        .row-modal > div.coords-col { flex: 0.75; }

        .drop-zone {
            border: 2px dashed #cbd5e1; border-radius: 8px; padding: 10px; text-align: center;
            color: #94a3b8; font-size: 13px; font-weight: 600; transition: all 0.3s; cursor: pointer;
            margin-bottom: 8px; flex-shrink: 0;
        }
        .drop-zone.drag-over { border-color: #3b82f6; background: #eff6ff; color: #3b82f6; }
        .drop-zone .drop-icon { font-size: 24px; margin-bottom: 4px; }

        .toggle-container { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-left: auto; position: relative; }
        .toggle-switch { position: relative; width: 28px; height: 16px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: 0.3s; border-radius: 16px; }
        .toggle-slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: white; transition: 0.3s; border-radius: 50%; }
        input:checked + .toggle-slider { background-color: #f59e0b; }
        input:checked + .toggle-slider:before { transform: translateX(12px); }
        .toggle-label-text { cursor: help; }
        .toggle-label-text:hover::after { content: attr(data-tooltip); position: absolute; bottom: 120%; right: 0; background: #1e293b; color: white; padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: 500; text-transform: none; white-space: nowrap; z-index: 10; pointer-events: none; }

        .loading-msg { display: none; text-align: center; padding: 10px; color: #3b82f6; font-weight: 700; font-size: 13px; }
        .loading-msg.active { display: block; }

        @media (max-width: 768px) {
            .row-modal { flex-direction: column; }
            .btn-row { flex-direction: column; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="selector-canto">
            <select id="fusoSelect" onchange="atualizarModo(); salvarModo();">
                <option value="23-22">23 → 22</option>
                <option value="22-21">22 → 21</option>
            </select>
        </div>
        <div class="header">
            <div class="gear-icon">⚙️</div>
            <h1>Conversor de<br>Coordenadas</h1>
        </div>
        <div class="system-info">
            <div class="system-name">Sistema: <strong>CONVERTER_COORD</strong></div>
            <div class="developer">Desenvolvido por: <strong>Gabriel Campos</strong></div>
        </div>
        <div class="buttons">
            <button class="btn btn-blue" onclick="abrirModal('kml')">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                CONVERTER .KML
            </button>
            <button class="btn btn-green" onclick="abrirModal('coord')">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                CONVERTER COORD
            </button>
        </div>
    </div>

    <div id="modal-kml" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="kmlTitulo">📄 CONVERTER .KML</h2>
                <button class="close-btn" onclick="fecharModal('kml')">&times;</button>
            </div>
            <div class="modal-body">
                <label>Cole o conteúdo ou arraste o arquivo .KML ou .KMZ aqui:</label>
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <div class="drop-icon">📂</div>
                    <div>Arraste um arquivo .KML / .KMZ aqui ou clique para selecionar</div>
                </div>
                <input type="file" id="fileInput" accept=".kml,.kmz,.xml" style="display:none" onchange="carregarArquivo(event)">
                <div class="loading-msg" id="loadingMsg">⏳ Descompactando KMZ...</div>
                <textarea id="kmlInput" class="input-area" placeholder="Ou cole o conteúdo do KML aqui..."></textarea>
                <div class="btn-row">
                    <button class="btn btn-blue btn-sm" onclick="processarKML()">🔄 CONVERTER</button>
                    <button class="btn btn-green btn-sm" onclick="copiarTodasCoordenadas()">📋 COPIAR TODAS</button>
                    <button class="btn btn-orange btn-sm" onclick="gerarScript()">📐 GERAR SCRIPT</button>
                    <button class="btn btn-blue btn-sm" style="background:#64748b;box-shadow:0 4px 0 #475569;" onclick="limparKML()">🗑️ LIMPAR</button>
                    <div class="toggle-container">
                        <span class="toggle-label-text" data-tooltip="Ligado: mantém no fuso de origem. Desligado: converte para o fuso de destino.">🔄</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggleConversao" onchange="atualizarToggle()">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
                <div class="row-modal">
                    <div class="nomes-col">
                        <label>🏷️ Nomes: <span class="badge" id="kmlCount">0</span></label>
                        <div id="kmlNomes" class="output-box output-box-nomes"></div>
                    </div>
                    <div class="coords-col">
                        <label id="kmlLabelSaida">✅ Fuso 22:</label>
                        <div id="kmlOutput" class="output-box output-box-coords"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-coord" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="coordTitulo">🗺️ CONVERTER COORDENADAS</h2>
                <button class="close-btn" onclick="fecharModal('coord')">&times;</button>
            </div>
            <div class="modal-body">
                <label id="coordLabelEntrada">Cole coordenadas Fuso 23 (E,N), uma por linha:</label>
                <textarea id="coordInput" class="input-area" placeholder="205906,8889248&#10;206585,8889248&#10;..."></textarea>
                <div class="btn-row">
                    <button class="btn btn-blue btn-sm" onclick="processarCoord()">🔄 CONVERTER</button>
                    <button class="btn btn-green btn-sm" onclick="copiarTodasCoordenadasCoord()">📋 COPIAR TODAS</button>
                    <button class="btn btn-blue btn-sm" style="background:#64748b;box-shadow:0 4px 0 #475569;" onclick="limparCoord()">🗑️ LIMPAR</button>
                </div>
                <div class="row-modal">
                    <div>
                        <label id="coordLabelSaida">✅ Fuso 22: <span class="badge" id="coordCount">0</span></label>
                        <div id="coordOutput" class="output-box output-box-coords"></div>
                    </div>
                    <div>
                        <label>📐 Decimal: <span class="badge" id="decimalCount">0</span></label>
                        <div id="decimalOutput" class="output-box output-box-coords"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
function salvarModo() { localStorage.setItem('conversorModo', document.getElementById('fusoSelect').value); }
function carregarModo() {
    let modoSalvo = localStorage.getItem('conversorModo');
    if (modoSalvo) document.getElementById('fusoSelect').value = modoSalvo;
    atualizarModo();
}
window.addEventListener('DOMContentLoaded', carregarModo);

function getModo() { return document.getElementById('fusoSelect').value; }
function getParams() {
    let modo = getModo();
    if (modo === '23-22') return { fusoEntrada: -45, fusoSaida: -51, nomeEntrada: 'Fuso 23', nomeSaida: 'Fuso 22', placeholder: '205906,8889248' };
    return { fusoEntrada: -51, fusoSaida: -57, nomeEntrada: 'Fuso 22', nomeSaida: 'Fuso 21', placeholder: '531596,8715057' };
}
function atualizarModo() {
    let p = getParams();
    document.getElementById('kmlLabelSaida').textContent = '✅ ' + p.nomeSaida + ':';
    document.getElementById('coordTitulo').textContent = '🗺️ CONVERTER ' + p.nomeEntrada.toUpperCase() + ' → ' + p.nomeSaida.toUpperCase();
    document.getElementById('coordLabelEntrada').textContent = 'Cole coordenadas ' + p.nomeEntrada + ' (E,N), uma por linha:';
    document.getElementById('coordLabelSaida').innerHTML = '✅ ' + p.nomeSaida + ': <span class="badge" id="coordCount">0</span>';
    document.getElementById('coordInput').placeholder = p.placeholder + '\n...';
}

function conversaoAtivada() { return document.getElementById('toggleConversao').checked; }
function atualizarToggle() { }

let ultimasCoordenadasKML = [];
let ultimasCoordenadasCoord = [];
let dadosScript = { pontos: [], tracados: [] };

function renderizarCoordenadas(containerId, coordenadas) {
    let container = document.getElementById(containerId);
    container.innerHTML = '';
    coordenadas.forEach((coord, index) => {
        if (index > 0) container.appendChild(document.createTextNode('\n'));
        let span = document.createElement('span');
        span.className = 'coord-click';
        span.textContent = coord;
        span.title = 'Clique para copiar';
        span.addEventListener('click', function() {
            navigator.clipboard.writeText(coord).then(() => {
                span.classList.add('copied');
                setTimeout(() => span.classList.remove('copied'), 500);
            });
        });
        container.appendChild(span);
    });
}

function renderizarNomes(containerId, nomes) {
    let container = document.getElementById(containerId);
    container.innerHTML = '';
    nomes.forEach((nome, index) => {
        if (index > 0) container.appendChild(document.createTextNode('\n'));
        container.appendChild(document.createTextNode(nome));
    });
}

function vincularScrollDivs(el1, el2) {
    let syncing = false;
    el1.addEventListener('scroll', function() { if (!syncing) { syncing = true; el2.scrollTop = this.scrollTop; syncing = false; } });
    el2.addEventListener('scroll', function() { if (!syncing) { syncing = true; el1.scrollTop = this.scrollTop; syncing = false; } });
}

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', (e) => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    let file = e.dataTransfer.files[0];
    if (file) processarArquivo(file);
});
function carregarArquivo(event) { let file = event.target.files[0]; if (file) processarArquivo(file); }

async function processarArquivo(file) {
    let nome = file.name.toLowerCase();
    let loading = document.getElementById('loadingMsg');
    let textarea = document.getElementById('kmlInput');
    if (nome.endsWith('.kmz')) {
        loading.classList.add('active');
        try {
            let zip = await JSZip.loadAsync(file);
            let kmlFile = null;
            zip.forEach((relativePath, zipEntry) => {
                if (relativePath.toLowerCase().endsWith('.kml') && !kmlFile) kmlFile = zipEntry;
            });
            if (kmlFile) { let content = await kmlFile.async('string'); textarea.value = content; }
            else { alert('Nenhum arquivo .KML encontrado dentro do .KMZ.'); }
        } catch (e) { alert('Erro ao descompactar o arquivo .KMZ.'); }
        loading.classList.remove('active');
    } else if (nome.endsWith('.kml') || nome.endsWith('.xml')) {
        let reader = new FileReader();
        reader.onload = function(e) { textarea.value = e.target.result; };
        reader.readAsText(file);
    } else { alert('Formato não suportado. Use .KML, .KMZ ou .XML'); }
}

async function processarKML() {
    let p = getParams();
    let kml = document.getElementById('kmlInput').value;
    let countEl = document.getElementById('kmlCount');
    let manterFuso = conversaoAtivada();
    try {
        let response = await fetch('/api/converter', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo: 'kml', dados: kml, fusoEntrada: p.fusoEntrada, fusoSaida: p.fusoSaida, manterFuso: manterFuso })
        });
        let data = await response.json();
        ultimasCoordenadasKML = data.coordsArray;
        dadosScript = data.scriptData;
        renderizarNomes('kmlNomes', data.nomesArray);
        renderizarCoordenadas('kmlOutput', data.coordsArray);
        countEl.textContent = data.quantidade;
        vincularScrollDivs(document.getElementById('kmlNomes'), document.getElementById('kmlOutput'));
    } catch (e) { alert('Erro ao converter.'); }
}

async function processarCoord() {
    let p = getParams();
    let input = document.getElementById('coordInput').value;
    let decimalCount = document.getElementById('decimalCount');
    let coordCount = document.getElementById('coordCount');
    try {
        let response = await fetch('/api/converter', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo: 'coord', dados: input, fusoEntrada: p.fusoEntrada, fusoSaida: p.fusoSaida })
        });
        let data = await response.json();
        ultimasCoordenadasCoord = data.fusoSaidaArray;
        renderizarCoordenadas('coordOutput', data.fusoSaidaArray);
        renderizarCoordenadas('decimalOutput', data.decimalArray);
        coordCount.textContent = data.quantidade;
        decimalCount.textContent = data.quantidade;
    } catch (e) { alert('Erro ao converter.'); }
}

function gerarScript() {
    if (dadosScript.pontos.length === 0 && dadosScript.tracados.length === 0) { alert('Converta um KML primeiro.'); return; }
    let linhas = [];
    linhas.push('FILEDIA 0');
    for (let pt of dadosScript.pontos) {
        linhas.push('POINT ' + pt.e + ',' + pt.n);
        linhas.push('-TEXT ' + (pt.e + 2) + ',' + (pt.n + 2) + ' 2 0 ' + pt.nome);
    }
    for (let tr of dadosScript.tracados) {
        if (tr.coords.length < 2) continue;
        linhas.push('PLINE');
        for (let v of tr.coords) linhas.push(v.e + ',' + v.n);
        linhas.push('');
    }
    linhas.push('ZOOM E'); linhas.push('FILEDIA 1'); linhas.push('');
    navigator.clipboard.writeText(linhas.join('\n')).then(() => alert('Script copiado!')).catch(() => alert('Erro ao copiar.'));
}

function copiarTodasCoordenadas() {
    if (ultimasCoordenadasKML.length === 0) { alert('Nenhuma coordenada.'); return; }
    navigator.clipboard.writeText(ultimasCoordenadasKML.join('\n')).then(() => alert('Copiado!'));
}
function copiarTodasCoordenadasCoord() {
    if (ultimasCoordenadasCoord.length === 0) { alert('Nenhuma coordenada.'); return; }
    navigator.clipboard.writeText(ultimasCoordenadasCoord.join('\n')).then(() => alert('Copiado!'));
}

function abrirModal(tipo) { atualizarModo(); document.getElementById('modal-' + tipo).classList.add('active'); }
function fecharModal(tipo) { document.getElementById('modal-' + tipo).classList.remove('active'); }

function limparKML() {
    document.getElementById('kmlInput').value = '';
    document.getElementById('kmlNomes').innerHTML = '';
    document.getElementById('kmlOutput').innerHTML = '';
    document.getElementById('kmlCount').textContent = '0';
    ultimasCoordenadasKML = []; dadosScript = { pontos: [], tracados: [] };
}
function limparCoord() {
    document.getElementById('coordInput').value = '';
    document.getElementById('decimalOutput').innerHTML = '';
    document.getElementById('coordOutput').innerHTML = '';
    document.getElementById('decimalCount').textContent = '0';
    document.getElementById('coordCount').textContent = '0';
    ultimasCoordenadasCoord = [];
}
</script>

</body>
</html>
